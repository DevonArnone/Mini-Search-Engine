services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mini_search
      POSTGRES_USER: mini_search
      POSTGRES_PASSWORD: mini_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_search -d mini_search"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: mini_search_master_key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://mini_search:mini_search@postgres:5432/mini_search
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: mini_search_master_key
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    ports:
      - "3000:3000"

  crawler-job:
    build:
      context: ./services/crawler
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://mini_search:mini_search@postgres:5432/mini_search
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: mini_search_master_key
      CRAWLER_IGNORE_ROBOTS: "true"
      SEED_CONFIG_PATH: seeds/docs_sources.yaml
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command:
      [
        "sh",
        "-c",
        "python scripts/init_db.py && python scripts/init_index.py && python scripts/load_seeds.py && python scripts/run_crawl.py"
      ]

volumes:
  postgres_data:
  meili_data:
