version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mini_search
      POSTGRES_USER: mini_search
      POSTGRES_PASSWORD: mini_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_search -d mini_search"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: mini_search_master_key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  crawler:
    build:
      context: ./services/crawler
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    command: ["python", "-m", "app.pipeline.worker"]

volumes:
  postgres_data:
  meili_data:

